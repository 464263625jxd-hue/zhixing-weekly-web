<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="知行周刊 · 数字化知识库 - 提供最新商业资讯、行业洞察和数据分析">
    <title>知行周刊 · 数字化知识库</title>

    <!-- Preload critical resources -->
    <link rel="preload" href="https://cdn.tailwindcss.com" as="script">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/chart.js" as="script">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@500;700&display=swap"></noscript>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>

    <style>
        /* Base styles */
        :root {
            --brand-dark: #0B1120;
            --brand-primary: #003366;
            --brand-accent: #F59E0B;
            --brand-light: #3B82F6;
            --brand-soft: #F8FAFC;
        }
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #f1f5f9; 
            color: #0f172a; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
            width: 100%; 
            scroll-behavior: smooth; 
        }
        
        html { 
            -webkit-overflow-scrolling: touch; 
        }
        
        .serif { 
            font-family: 'Noto Serif SC', serif; 
        }
        
        [x-cloak] { 
            display: none !important; 
        }
        
        .portal-bg { 
            background-color: #0f172a; 
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%); 
            min-height: 100vh; 
            min-height: -webkit-fill-available; 
        }
        
        .card-hover { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .card-hover:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
        }
        
        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        
        .no-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }

        .custom-scrollbar::-webkit-scrollbar { 
            width: 6px; 
        }
        
        .custom-scrollbar::-webkit-scrollbar-track { 
            background: rgba(255,255,255,0.02); 
            border-radius: 4px; 
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(255,255,255,0.15); 
            border-radius: 4px; 
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { 
            background: rgba(255,255,255,0.3); 
        }

        .hl-data { 
            color: #b45309; 
            font-weight: 800; 
            background-color: rgba(251, 191, 36, 0.15); 
            padding: 0 4px; 
            border-radius: 2px; 
            margin: 0 2px; 
        }
        
        mark { 
            background-color: #fde047; 
            color: #1f2937; 
            padding: 0 0.2rem; 
            border-radius: 0.125rem; 
        }
        
        @media (max-width: 640px) { 
            .modal-content { 
                height: 100vh; 
                height: 100dvh; 
                max-height: 100dvh; 
                border-radius: 0; 
                padding-bottom: env(safe-area-inset-bottom); 
            } 
        }
        
        nav { 
            padding-top: env(safe-area-inset-top); 
        }
        
        /* Loading animation */
        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: var(--brand-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive improvements */
        @media (max-width: 768px) {
            .container-padding {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            
            .section-padding {
                padding-top: 1.5rem;
                padding-bottom: 1.5rem;
            }
        }
        
        /* Smooth transitions */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Improved focus styles for accessibility */
        button:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--brand-accent);
            outline-offset: 2px;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        brand: { 
                            dark: '#0B1120', 
                            primary: '#003366', 
                            accent: '#F59E0B', 
                            light: '#3B82F6', 
                            soft: '#F8FAFC' 
                        } 
                    } 
                } 
            } 
        }
    </script>

    <script>
        let GLOBAL_ISSUE_DB = [];

        function platformApp() {
            return {
                // --- 核心状态 ---
                isLoading: true,
                loadError: false,
                view: 'portal',
                toastMessage: '',
                showBackToTop: false,

                // --- 数据存储 ---
                issueDB: [],
                companyDB: {},
                libraryDB: [],

                // --- 导航与筛选状态 ---
                currentIssueId: null,
                currentIssueData: null,
                currentIndustry: null,
                currentCorporateCategory: '美妆',
                libraryFilter: '全部',

                // --- 阅读器状态 ---
                activeTab: 'home',
                subFilter: 'all',
                searchQuery: '',
                selectedNews: null,
                displayLimit: 30,

                // --- 全局搜索状态 ---
                showGlobalSearch: false,
                globalSearchQuery: '',
                selectedIndustryNews: null,

                sectorConfig: {
                    '宏观': { color: 'text-slate-600', bg: 'bg-slate-50', border: 'border-slate-200', gradient: 'from-slate-700 to-slate-900' },
                    '平台': { color: 'text-sky-600', bg: 'bg-sky-50', border: 'border-sky-200', gradient: 'from-sky-600 to-blue-800' },
                    '美妆': { color: 'text-pink-600', bg: 'bg-pink-50', border: 'border-pink-200', gradient: 'from-pink-500 to-rose-700' },
                    '食品饮料': { color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-200', gradient: 'from-orange-500 to-amber-700' },
                    '母婴': { color: 'text-rose-600', bg: 'bg-rose-50', border: 'border-rose-200', gradient: 'from-rose-400 to-red-600' },
                    '宠物': { color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-200', gradient: 'from-emerald-500 to-teal-700' }
                },
                sectorStyles: {
                    '宏观': 'text-slate-600 bg-slate-50 border-slate-200',
                    '平台': 'text-sky-600 bg-sky-50 border-sky-200',
                    '美妆': 'text-pink-600 bg-pink-50 border-pink-200',
                    '食品饮料': 'text-orange-600 bg-orange-50 border-orange-200',
                    '母婴': 'text-rose-600 bg-rose-50 border-rose-200',
                    '宠物': 'text-emerald-600 bg-emerald-50 border-emerald-200'
                },
                tabs: [
                    { id: 'home', name: '本期概览' }, 
                    { id: 'all', name: '全部资讯' }, 
                    { id: '宏观', name: '宏观经济' }, 
                    { id: '平台', name: '平台动态' },
                    { id: '美妆', name: '美妆护肤' }, 
                    { id: '食品饮料', name: '食品饮料' }, 
                    { id: '母婴', name: '母婴亲子' }, 
                    { id: '宠物', name: '宠物经济' }
                ],

                // --- 初始化与路由 ---
                async init() {
                    try {
                        // 使用缓存策略加载数据
                        const cacheKey = 'zhixing_weekly_data_' + new Date().toISOString().split('T')[0];
                        
                        // 尝试从缓存获取数据
                        const cachedData = localStorage.getItem(cacheKey);
                        if (cachedData) {
                            const parsedData = JSON.parse(cachedData);
                            if (parsedData && parsedData.timestamp) {
                                const cacheAge = Date.now() - parsedData.timestamp;
                                // 如果缓存小于24小时则使用缓存
                                if (cacheAge < 24 * 60 * 60 * 1000) {
                                    console.log('使用缓存数据');
                                    this.processData(parsedData.data);
                                    return;
                                }
                            }
                        }
                        
                        // 缓存失效或不存在，从服务器获取
                        const response = await fetch('data.json');
                        if (!response.ok) {
                            throw new Error(`网络请求失败: ${response.status} ${response.statusText}`);
                        }
                        
                        const data = await response.json();
                        
                        // 验证数据完整性
                        if (!data.issues || !Array.isArray(data.issues) || 
                            !data.companies || typeof data.companies !== 'object' || 
                            !data.library || Array.isArray(data.library)) {
                            throw new Error('数据格式不正确');
                        }
                        
                        // 缓存数据
                        const cacheData = {
                            data: data,
                            timestamp: Date.now()
                        };
                        localStorage.setItem(cacheKey, JSON.stringify(cacheData));
                        
                        this.processData(data);
                    } catch (error) {
                        console.error('数据加载失败:', error);
                        this.loadError = true;
                        this.isLoading = false;
                        this.showToast('数据加载失败，请检查 data.json 文件是否存在');
                    }
                },

                processData(data) {
                    this.issueDB = data.issues || [];
                    this.companyDB = data.companies || {};
                    this.libraryDB = data.library || [];
                    GLOBAL_ISSUE_DB = this.issueDB;

                    this.isLoading = false;

                    // 路由监听
                    window.addEventListener('hashchange', this.handleRoute.bind(this));
                    this.handleRoute(); // 页面加载时执行
                    window.addEventListener('scroll', this.handleScroll.bind(this));
                    
                    // 添加页面可见性API处理
                    document.addEventListener('visibilitychange', () => {
                        if (!document.hidden) {
                            // 页面重新可见时，检查是否需要刷新数据
                            this.refreshDataIfNeeded();
                        }
                    });
                },

                async refreshDataIfNeeded() {
                    // 可以在这里添加数据刷新逻辑
                    // 例如，如果页面长时间未操作，可以重新检查数据
                },

                handleRoute() {
                    const hash = window.location.hash.slice(1) || 'portal';
                    const parts = hash.split('/');
                    const targetView = parts[0];

                    // 关闭所有弹窗
                    this.showGlobalSearch = false;
                    this.selectedNews = null;
                    this.selectedIndustryNews = null;
                    document.body.style.overflow = 'auto';

                    if (targetView === 'reader' && parts[1]) {
                        const id = parseInt(parts[1]);
                        const issue = this.issueDB.find(i => i.id === id);
                        if (issue) {
                            this.currentIssueId = id;
                            this.currentIssueData = issue;
                            this.view = 'reader';
                            this.resetReaderState();
                            // 使用 nextTick 确保DOM更新后再初始化图表
                            this.$nextTick(() => {
                                try {
                                    this.initChart();
                                } catch (chartError) {
                                    console.error('图表初始化失败:', chartError);
                                }
                            });
                            window.scrollTo({ top: 0, behavior: 'instant' });
                        } else {
                            this.navigate('portal');
                        }
                    } else if (targetView === 'industry' && parts[1]) {
                        this.currentIndustry = decodeURIComponent(parts[1]);
                        this.view = 'industry';
                        window.scrollTo({ top: 0, behavior: 'instant' });
                    } else if (targetView === 'corporate' && parts[1]) {
                        this.currentCorporateCategory = decodeURIComponent(parts[1]);
                        this.view = 'corporate';
                        window.scrollTo({ top: 0, behavior: 'instant' });
                    } else if (targetView === 'library') {
                        this.view = 'library';
                        window.scrollTo({ top: 0, behavior: 'instant' });
                    } else {
                        this.view = 'portal';
                        window.scrollTo({ top: 0, behavior: 'instant' });
                    }
                },

                navigate(view, param = null) {
                    let path = `#${view}`;
                    if (param) path += `/${param}`;
                    window.location.hash = path;
                },

                handleScroll() {
                    this.showBackToTop = window.scrollY > 300;
                },

                scrollToTop() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                // --- 提示框工具 ---
                showToast(msg) {
                    this.toastMessage = msg;
                    setTimeout(() => { 
                        this.toastMessage = ''; 
                    }, 3000);
                },

                // --- 计算属性 ---
                get latestIssue() { 
                    return this.issueDB[0] || {}; 
                },
                
                get pastIssues() { 
                    return this.issueDB.slice(1); 
                },
                
                get currentCompanies() { 
                    return this.companyDB[this.currentCorporateCategory] || []; 
                },

                // 资料库过滤
                get libraryCategories() {
                    const cats = new Set(this.libraryDB.map(i => i.category));
                    return ['全部', ...Array.from(cats)];
                },
                
                get filteredLibrary() {
                    if (this.libraryFilter === '全部') return this.libraryDB;
                    return this.libraryDB.filter(i => i.category === this.libraryFilter);
                },

                get industryTimeline() {
                    if (!this.currentIndustry) return [];
                    return this.issueDB.map(issue => {
                        const news = issue.data ? issue.data.filter(item => item.category === this.currentIndustry) : [];
                        const insight = issue.insight ? issue.insight[this.currentIndustry] : null;
                        if (news.length === 0 && !insight) return null;
                        return { issueId: issue.id, date: issue.date, insight: insight, news: news };
                    }).filter(item => item !== null);
                },

                get globalSearchResults() {
                    if (!this.globalSearchQuery.trim()) return [];
                    const q = this.globalSearchQuery.toLowerCase();
                    let results = [];
                    this.issueDB.forEach(issue => {
                        if (issue.data) {
                            issue.data.forEach(item => {
                                if ((item.title && item.title.toLowerCase().includes(q)) || 
                                    (item.content && item.content.toLowerCase().includes(q))) {
                                    results.push({ 
                                        issueId: issue.id, 
                                        date: issue.date, 
                                        ...item 
                                    });
                                }
                            });
                        }
                    });
                    // 限制结果数量以提高性能
                    return results.slice(0, 50);
                },

                get newsData() { 
                    return this.currentIssueData ? this.currentIssueData.data : []; 
                },
                
                get zhixingInsight() { 
                    return (this.currentIssueData && this.currentIssueData.insight) ? 
                           this.currentIssueData.insight[this.activeTab] || {} : {}; 
                },

                get subCategories() {
                    if (this.activeTab === 'home' || this.activeTab === 'all' || !this.newsData) return [];
                    const categories = new Set(
                        this.newsData
                            .filter(i => i.category === this.activeTab)
                            .map(i => i.subCategory)
                            .filter(Boolean)
                    );
                    return Array.from(categories);
                },

                get allMatchingNews() {
                    let data = this.newsData || [];
                    if (this.searchQuery.trim() !== '') {
                        const q = this.searchQuery.toLowerCase();
                        return data.filter(item => 
                            (item.title && item.title.toLowerCase().includes(q)) || 
                            (item.content && item.content.toLowerCase().includes(q))
                        );
                    }
                    if (this.activeTab === 'home') return [];
                    if (this.activeTab !== 'all') data = data.filter(item => item.category === this.activeTab);
                    if (this.subFilter !== 'all') data = data.filter(item => item.subCategory === this.subFilter);
                    return data;
                },

                get filteredNews() { 
                    return this.allMatchingNews.slice(0, this.displayLimit); 
                },
                
                get hasMore() { 
                    return this.displayLimit < this.allMatchingNews.length; 
                },

                // --- 文本处理与高亮 ---
                highlightText(text) {
                    if (!text) return '';
                    let cleanText = text.replace(/\*\*/g, '');
                    cleanText = cleanText.replace(/(\d+(?:\.\d+)?(?:万|亿|亿元|美元|%)|202\d年\d+月|TOP\d+)/g, '<span class="hl-data">$1</span>');
                    if (this.searchQuery.trim() !== '') {
                        const q = this.searchQuery.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        const regex = new RegExp(`(${q})`, 'gi');
                        cleanText = cleanText.replace(regex, '<mark>$1</mark>');
                    }
                    return cleanText;
                },

                // 复制功能
                async copyArticle(item) {
                    try {
                        const title = item.title || '';
                        const content = item.content || item.summary || '';
                        const plainText = `【${title}】\n${content}`;
                        const htmlText = `<strong>${title}</strong><br><br>${content.replace(/\n/g, '<br>')}`;

                        // 检查浏览器是否支持 Clipboard API
                        if (navigator.clipboard && window.ClipboardItem) {
                            const clipboardItem = new ClipboardItem({
                                'text/plain': new Blob([plainText], { type: 'text/plain' }),
                                'text/html': new Blob([htmlText], { type: 'text/html' })
                            });
                            await navigator.clipboard.write([clipboardItem]);
                        } else {
                            // 降级方案
                            await navigator.clipboard.writeText(plainText);
                        }
                        this.showToast('复制成功！');
                    } catch (err) {
                        console.error('复制失败:', err);
                        this.showToast('复制失败，请重试');
                    }
                },

                getCompanyLogoUrl(company) {
                    try {
                        const domain = new URL(company.site).hostname.replace('www.', '');
                        return `https://logo.clearbit.com/${domain}`;
                    } catch (e) {
                        return this.getFallbackLogo(company.name);
                    }
                },

                getFallbackLogo(name) {
                    const colors = { 
                        '美妆': 'ec4899', 
                        '个护家清': '8b5cf6', 
                        '食品饮料': 'f97316', 
                        '母婴': 'f43f5e', 
                        '宠物': '10b981' 
                    };
                    const color = colors[this.currentCorporateCategory] || '003366';
                    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=${color}&color=fff&size=128&length=1&font-size=0.5`;
                },

                openSearchResult(item) {
                    this.navigate('reader', item.issueId);
                    setTimeout(() => {
                        this.openDetail(item);
                    }, 100);
                },

                viewDetail(item) {
                    this.selectedIndustryNews = item;
                    document.body.style.overflow = 'hidden';
                },

                closeIndustryDetail() {
                    this.selectedIndustryNews = null;
                    document.body.style.overflow = 'auto';
                },

                resetReaderState() {
                    this.activeTab = 'home';
                    this.subFilter = 'all';
                    this.searchQuery = '';
                    this.displayLimit = 30;
                },

                switchTab(id) {
                    this.activeTab = id;
                    this.subFilter = 'all';
                    this.searchQuery = '';
                    this.displayLimit = 30;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    if(id === 'home') {
                        this.$nextTick(() => {
                            try {
                                this.initChart();
                            } catch (chartError) {
                                console.error('图表初始化失败:', chartError);
                            }
                        });
                    }
                },

                openDetail(item) { 
                    this.selectedNews = item; 
                    document.body.style.overflow = 'hidden'; 
                },
                
                closeDetail() { 
                    this.selectedNews = null; 
                    document.body.style.overflow = 'auto'; 
                },
                
                loadMore() { 
                    this.displayLimit += 30; 
                },

                getSectorHighlight(cat) {
                    if (!this.newsData) return { main: { title: '加载中...' }, list: [], count: 0 };
                    const items = this.newsData.filter(i => i.category === cat);
                    let mainIndex = items.findIndex(i => i.isAlert || ['战略','头条','新品'].includes(i.subCategory));
                    if (mainIndex === -1) mainIndex = 0;
                    const main = items[mainIndex] || { title: '暂无数据' };
                    const list = items.filter((_, idx) => idx !== mainIndex).slice(0, 3);
                    return { main, list, count: items.length };
                },

                initChart() {
                    const ctx = document.getElementById('readerChart');
                    if (!ctx || !this.newsData || !this.newsData.length) return;
                    
                    try {
                        const existingChart = Chart.getChart("readerChart");
                        if (existingChart) existingChart.destroy();
                        
                        const counts = {};
                        this.newsData.forEach(item => { 
                            if(item.category) counts[item.category] = (counts[item.category] || 0) + 1; 
                        });
                        
                        new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: Object.keys(counts),
                                datasets: [{
                                    data: Object.values(counts), 
                                    backgroundColor: [
                                        '#64748b', 
                                        '#0ea5e9', 
                                        '#ec4899', 
                                        '#f97316', 
                                        '#f43f5e', 
                                        '#10b981',
                                        '#8b5cf6',
                                        '#06b6d4'
                                    ],
                                    borderWidth: 0 
                                }]
                            },
                            options: { 
                                responsive: true, 
                                maintainAspectRatio: false, 
                                cutout: '75%', 
                                plugins: { 
                                    legend: { 
                                        display: false 
                                    },
                                    tooltip: {
                                        callbacks: {
                                            label: function(context) {
                                                const label = context.label || '';
                                                const value = context.raw || 0;
                                                const total = context.dataset.data.reduce((sum, val) => sum + val, 0);
                                                const percentage = Math.round((value / total) * 100);
                                                return `${label}: ${value} (${percentage}%)`;
                                            }
                                        }
                                    }
                                } 
                            }
                        });
                    } catch (error) {
                        console.error('图表初始化失败:', error);
                    }
                }
            }
        }
    </script>
</head>
<body x-data="platformApp()" class="antialiased portal-bg relative">

    <!-- Toast notification -->
    <div x-show="toastMessage" 
         x-transition:enter="transition ease-out duration-300" 
         x-transition:enter-start="opacity-0 translate-y-4" 
         x-transition:enter-end="opacity-100 translate-y-0" 
         x-transition:leave="transition ease-in duration-200" 
         x-transition:leave-start="opacity-100 translate-y-0" 
         x-transition:leave-end="opacity-0 translate-y-4" 
         class="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-[300] bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center space-x-2" 
         x-cloak>
        <svg class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-sm font-bold" x-text="toastMessage"></span>
    </div>

    <!-- Back to top button -->
    <button x-show="showBackToTop" 
            @click="scrollToTop()"

    <!-- Scripts -->
    <script>
        // 添加一些实用的辅助函数
        document.addEventListener('alpine:init', () => {
            // 添加一个用于获取特定类别行业时间线的辅助方法
            Alpine.data('sectorTimeline', (category) => ({
                get timeline() {
                    if (!this.currentIndustry) return [];
                    return this.issueDB.map(issue => {
                        const news = issue.data ? issue.data.filter(item => item.category === category) : [];
                        const insight = issue.insight ? issue.insight[category] : null;
                        if (news.length === 0 && !insight) return null;
                        return { issueId: issue.id, date: issue.date, insight: insight, news: news };
                    }).filter(item => item !== null);
                }
            }));
        });
        
        // 添加图片懒加载观察器
        document.addEventListener('DOMContentLoaded', () => {
            const imgObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.remove('lazy');
                        observer.unobserve(img);
                    }
                });
            });
            
            document.querySelectorAll('img[data-src]').forEach(img => {
                imgObserver.observe(img);
            });
        });
    </script>
